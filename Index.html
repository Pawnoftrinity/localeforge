<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LocaleForge · HTM Locale Generator</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet" />

    <!-- React 18 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel (JSX in browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- JSZip (bulk export) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #060d1f;
        color: #e2e8f0;
        font-family: 'JetBrains Mono', 'Fira Code', monospace;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
      }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
      ::-webkit-scrollbar-thumb { background: rgba(0,71,171,0.5); border-radius: 3px; }
      ::selection { background: rgba(0,71,171,0.45); color: #fff; }
      input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: rgba(0,100,255,0.55) !important;
        box-shadow: 0 0 0 2px rgba(0,71,171,0.18);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- LocaleForge — mounts itself via ReactDOM.createRoot at the bottom -->
    <script type="text/babel" data-presets="react" src="localeforge.jsx"></script>
  </body>
</html>
